title: ModeloUFCG
author: Jerfson Bruno
version: 1.0.0
quarto-required: ">=1.3.0"
contributes:
  formats:
    common:
      execute:
        echo: false
      fig-align: center
      fig-width: 4.5
      fig-height: 2.9
      fig-dpi: 300
    pdf:
      template: template.tex
      highlight-style: none
      keep-tex: false
      cite-method: natbib
      biblio-style: RS
      pdf-engine: xelatex
      resources:
        - modeloUFCG.cls
        - RS.bst
        - lea_logo_bw.png
